<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=360, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>ルアー在庫 軽量ランキング</title>
<style>
/* ══════════════════════════════════════════════════════════════
   ★GAS_URL・BROWSE_URLは必ず自分のデプロイURLに書き換えること
   ══════════════════════════════════════════════════════════════ */
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{background:#f0f4f3;font-family:'Hiragino Sans','Noto Sans JP',sans-serif;overflow:hidden;}
#wrap{position:relative;width:100%;max-width:480px;margin:0 auto;height:100vh;height:100dvh;overflow:hidden;}
#app{width:100%;height:100%;background:#f0f4f3;display:flex;flex-direction:column;}

/* ── ヘッダー（紺色） ── */
#hdr{background:#3845fd;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
#hdr-sub{color:#ffffff;font-size:15px;font-weight:800;}
#hdr-c{color:#ffffff;font-size:15px;font-weight:800;white-space:nowrap;display:flex;align-items:baseline;gap:0;}
#hdr-amt{display:inline-block;width:92px;text-align:right;font-variant-numeric:tabular-nums;}
#hdr-cnt{display:inline-block;width:50px;text-align:right;font-variant-numeric:tabular-nums;margin-left:6px;}

/* ── ローディング画面（データ取得完了までは一覧・ボタン共に表示しない） ── */
#loading{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;}
#loading p{font-size:13px;color:#444;font-weight:600;}
.spinner{width:36px;height:36px;border:4px solid #cfd8dc;border-top-color:#3845fd;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── リスト ── */
#list{flex:1;overflow-y:auto;padding:6px 6px 4px;display:none;}
.emptyhint{text-align:center;color:#888;font-size:13px;padding:40px 16px;line-height:1.6;}
.noresult{padding:24px;text-align:center;font-size:13px;color:#444;font-weight:600;}

/* ── 商品名グループカード（3行構成） ── */
.card{display:flex;flex-direction:column;padding:0 0 8px;margin:6px 8px;background:#ffffff;border-radius:9px;border:1px solid #000000;gap:3px;overflow:hidden;}

.row1{display:flex;align-items:baseline;justify-content:space-between;gap:6px;background:#d2f6dc;border-bottom:1px solid #000000;padding:8px 12px;}
.gn{font-size:15px;font-weight:700;color:#1a5f4a;line-height:1.3;flex:1 1 auto;min-width:0;overflow-wrap:break-word;word-break:break-word;}
.gc{font-size:13px;font-weight:700;color:#111;flex-shrink:0;white-space:nowrap;}

.row2{display:flex;align-items:center;gap:5px;font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;padding:0 12px;}
.lbl-buy{color:#3845fd;}
.buywrap{white-space:nowrap;flex:0 0 auto;}
.buy{display:inline-block;width:62px;text-align:right;font-variant-numeric:tabular-nums;}
.pbuy-c0{color:#000000;}
.pbuy-c1{color:#00a8f3;}
.pbuy-c2{color:#11db4a;}
.pbuy-c3{color:#ec1c24;}
.lbl-profit{color:#ff31d2;margin-left:4px;}
.pu{color:#ff31d2;white-space:nowrap;}
.pd{color:#000000;white-space:nowrap;}
.pno{color:#1a5f4a;white-space:nowrap;}
.seq{font-size:14px;font-weight:700;color:#000000;white-space:nowrap;margin-left:auto;flex-shrink:0;}

.row3{display:flex;align-items:center;gap:6px;padding:0 12px;}
.st-wrap{font-size:12px;font-weight:700;color:#111;white-space:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;flex:1 1 auto;min-width:0;}
.st-wrap::-webkit-scrollbar{display:none;}
.st-item{margin-right:6px;}
.link-btn{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:#ff5208;color:#fff;font-size:13px;font-weight:900;text-decoration:none;line-height:1;flex-shrink:0;}

/* ── ボトムコントロールパネル（データ取得完了まで非表示） ── */
#bot{background:#fff;border-top:1px solid #ccc;padding:6px 6px 8px;flex-shrink:0;display:none;}
#btns{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:5px;}
.bn{font-size:13px;font-weight:700;padding:16px 2px;border-radius:7px;border:1px solid #888;background:#f0f0f0;color:#111;cursor:pointer;text-align:center;font-family:inherit;line-height:1.3;}
.bn.pr{background:#3845fd;color:#ffffff;border-color:#3845fd;}

/* ── オーバーレイ・パネル共通(カテゴリー／並び順)
     ★browse_index_v19と同じ実績のある方式：
     position:absolute + CSS変数 --bot-h（#botの実高さを1回測定するだけ）
     で#wrap内に静的配置する。JSで毎フレーム座標計算するfixed方式はやめた。 ── */
#ov{position:absolute;left:0;right:0;top:0;bottom:var(--bot-h,96px);background:rgba(0,0,0,.45);z-index:9;display:none;}
#ov.op{display:block;}
#pn{position:absolute;bottom:var(--bot-h,96px);left:0;right:0;background:#fff;border-radius:14px 14px 0 0;transform:translateY(calc(100% + var(--bot-h,96px)));transition:transform .27s cubic-bezier(.32,.72,0,1);z-index:10;max-height:calc(100% - var(--bot-h,96px) - 14px);display:flex;flex-direction:column;}
#pn.op{transform:translateY(0);}
.ph{display:flex;justify-content:space-between;align-items:center;padding:11px 14px 9px;background:#74d1fa;flex-shrink:0;}
.pt{font-size:17px;font-weight:700;color:#111;line-height:1.2;}
.pc{font-size:14px;color:#333;cursor:pointer;border:none;background:none;font-family:inherit;font-weight:600;line-height:1.2;}
.pl{overflow-y:auto;padding:6px 9px;flex:1;}
.sec-label{font-size:13px;color:#555;font-weight:700;padding:6px 2px 3px;border-bottom:1px solid #ddd;margin-bottom:4px;line-height:1.2;}
.pr2{display:flex;justify-content:space-between;align-items:center;padding:10px 11px;border-radius:8px;margin-bottom:3px;cursor:pointer;background:#f0f2f1;gap:8px;}
.pr2.sl{background:#e0f2fc;border:1.5px solid #1d24ed;}
.pr2 .pln{font-size:14px;color:#111;font-weight:600;flex:1 1 auto;min-width:0;line-height:1.15;}
.pr2.sl .pln{color:#0010cc;font-weight:800;}
.pr2 .pamt{font-size:14px;color:#ff5208;font-weight:700;white-space:nowrap;line-height:1.15;flex:0 0 auto;width:78px;text-align:right;font-variant-numeric:tabular-nums;}
.pr2 .plcwrap{flex:0 0 auto;color:#555;font-size:13px;font-weight:600;white-space:nowrap;line-height:1.15;}
.pr2.sl .plcwrap{color:#0010cc;font-weight:700;}
.pr2 .plc{display:inline-block;width:44px;text-align:right;font-variant-numeric:tabular-nums;}
#type-section{display:none;margin-top:8px;}
#type-section.show{display:block;}
</style>
</head>
<body>
<div id="wrap">
<div id="app">
  <div id="hdr">
    <span id="hdr-sub">ルアー在庫 軽量ランキング</span>
    <span id="hdr-c">¥<span id="hdr-amt">読込中</span><span id="hdr-cnt"></span>件</span>
  </div>

  <!-- ローディング画面（データ取得完了後にlist/botへ切り替え） -->
  <div id="loading">
    <div class="spinner"></div>
    <p id="load-msg">在庫データを読み込み中…</p>
  </div>

  <!-- カードリスト（ロード後に表示） -->
  <div id="list"></div>

  <!-- ボトムコントロール（ロード後に表示） -->
  <div id="bot">
    <div id="btns">
      <button class="bn" onclick="clrAll()">✕<br>クリア</button>
      <button class="bn" id="btnCategory" onclick="openPanel('category')">カテゴリー</button>
      <button class="bn" onclick="applyShow()">表示</button>
      <button class="bn" id="btnSort" onclick="openPanel('sort')">並び順</button>
    </div>
  </div>
</div>

<div id="ov" onclick="closeP()"></div>
<div id="pn">
  <div class="ph">
    <span class="pt" id="pt">カテゴリー・タイプ</span>
    <button class="pc" onclick="closeP()">✕ 閉じる</button>
  </div>
  <div class="pl" id="pc"></div>
</div>
</div>

<script>
// ★★★ 必ず自分のデプロイURLに書き換えること ★★★
const GAS_URL    = 'https://script.google.com/macros/s/AKfycbxYkNsXrKwaI49xu292E4a_CeP3kOTnou8hN13CWvSSJzTYum-SrZRYvJsYu6XxLqGwCg/exec';
const BROWSE_URL = 'https://86touroku-web.github.io/Browse/browse_index.html'; // 回覧アプリ側

let ALL_ITEMS = [];

// 確定済みフィルター（「表示」ボタンで確定するまでは一覧に反映されない）
let F = { category: null, type: null, sortKey: null, sortDir: null, confirmed: false };

// パネル編集中の一時選択（パネル切替時／「表示」ボタン押下時にFへ反映）
let selCat = null, selType = null;
let selSortKey = null, selSortDir = null;  // null = 未選択（既定の並び順を使用）

// 現在開いているパネル名（'category' | 'sort' | null）
let curP = null;

const SORT_ROWS = [
  { key:'cnt',   dir:'desc', label:'在庫が多い' },
  { key:'cnt',   dir:'asc',  label:'在庫が少ない' },
  { key:'price', dir:'high', label:'金額が高い' },
  { key:'price', dir:'low',  label:'金額が安い' },
];

function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

// カテゴリー・タイプパネルの件数表示（桁揃えはCSS側の固定幅+右揃えで行うため、ここでは数値をそのまま返す）
function cntBadge(n) {
  return n;
}

// ヘッダー用：合計金額（6桁ゼロ埋め＋標準3桁カンマ区切り）
function headerAmountStr(sum) {
  const s = String(Math.round(sum)).padStart(6, '0');
  let out = '';
  for (let i = 0; i < s.length; i++) {
    if (i > 0 && (s.length - i) % 3 === 0) out += ',';
    out += s[i];
  }
  return out;
}
// ヘッダー用：合計件数（桁揃えはCSS側の固定幅+右揃えで行うため、そのまま返す）
function headerCountStr(n) {
  return n;
}

// ── JSONP通信 ──────────────────────────────
function gasCall(fn, payload, cb) {
  const cbName = 'cb_' + fn + '_' + Date.now();
  window[cbName] = function(res) {
    delete window[cbName];
    document.getElementById('sc_' + cbName)?.remove();
    cb(res);
  };
  const params = new URLSearchParams({ fn, payload: JSON.stringify(payload||{}), callback: cbName });
  const script = document.createElement('script');
  script.id  = 'sc_' + cbName;
  script.src = GAS_URL + '?' + params.toString();
  script.onerror = function() {
    delete window[cbName];
    document.getElementById('sc_' + cbName)?.remove();
    cb({ ok:false, error:'通信に失敗しました（ネットワークまたはデプロイURLをご確認ください）' });
  };
  document.body.appendChild(script);
}

// ── 購入金額合計に応じた文字色クラス（browse_appのbuyTotalColorClassと同一ロジック）
function buyColorClass(sum) {
  if (sum >= 15000) return 'pbuy-c3';
  if (sum >= 10000) return 'pbuy-c2';
  if (sum >= 5000)  return 'pbuy-c1';
  return 'pbuy-c0';
}

// ── 利益率バッジ（数値部分のみ動的配色。ラベル「利益率」は常にピンク固定で別途付与）
function profitValue(g) {
  if (g.profitType === null) return '';
  if (g.profitName === null) {
    return `<span class="pno">00.0/${g.profitType.toFixed(1)}%</span>`;
  }
  const up = g.profitName >= g.profitType;
  const cl = up ? 'pu' : 'pd';
  return `<span class="${cl}">${g.profitName.toFixed(1)}/${g.profitType.toFixed(1)}%</span>`;
}

const STATUS_LIST = ['在庫','検品済','保品','No有','出タイ待','出品'];
const STATUS_ABBR = {'在庫':'在','検品済':'検','保品':'保','No有':'N','出タイ待':'待','出品':'出'};

// ── 商品名でグルーピングして集計 ──────────────────────────
function buildGroups(items) {
  const grps = {};
  items.forEach(p => {
    if (!grps[p.name]) {
      grps[p.name] = { name:p.name, cat:p.cat, type:p.type, items:[], sum:0,
                        profitType:p.profitType, profitName:p.profitName,
                        statusCount:{} };
      STATUS_LIST.forEach(s => grps[p.name].statusCount[s] = 0);
    }
    const g = grps[p.name];
    g.items.push(p);
    g.sum += Number(p.buyPrice)||0;
    if (STATUS_LIST.includes(p.status)) g.statusCount[p.status]++;
  });
  return Object.values(grps).map(g => ({ ...g, cnt: g.items.length }));
}

// ── 確定済みフィルターに合致する商品 ──────────────────────────
function passesFilter(p, ov) {
  ov = ov || {};
  const category = ov.category !== undefined ? ov.category : F.category;
  const type     = ov.type     !== undefined ? ov.type     : F.type;
  if (category && p.cat  !== category) return false;
  if (type     && p.type !== type)     return false;
  return true;
}
function filteredItems() {
  return ALL_ITEMS.filter(p => passesFilter(p, {}));
}

// ── ヘッダー動的テキスト（既存回覧アプリのupdHeaderと同一ロジック） ──
function updHeader() {
  const sub = document.getElementById('hdr-sub');
  if      (F.type)     sub.textContent = F.type;
  else if (F.category) sub.textContent = F.category;
  else                  sub.textContent = 'ルアー在庫 軽量ランキング';
}

// ── カテゴリーボタンの見た目更新（選択中は反転＋ラベル差替え） ──
function updCategoryBtn() {
  const btn = document.getElementById('btnCategory');
  const active = !!(F.category || F.type);
  btn.classList.toggle('pr', active);
  btn.textContent = F.type || F.category || 'カテゴリー';
}

// ── 並び順ボタンの見た目更新（選択中は反転＋ラベル差替え、未選択なら既定表示） ──
function sortLabel(key, dir) {
  const row = SORT_ROWS.find(r => r.key===key && r.dir===dir);
  return row ? row.label : '並び順';
}
function updSortBtn() {
  const btn = document.getElementById('btnSort');
  const active = !!F.sortKey;
  btn.classList.toggle('pr', active);
  btn.textContent = active ? sortLabel(F.sortKey, F.sortDir) : '並び順';
}

// ── カテゴリー・タイプパネル構築（既存回覧アプリのbuildCategoryPanelと同一ロジック＋金額表示） ──
function buildCategoryPanel(init) {
  if (init) { selCat = F.category; selType = F.type; }
  document.getElementById('pt').textContent = 'カテゴリー・タイプ';

  const cats = {};
  ALL_ITEMS.forEach(p => {
    if (!p.cat) return;
    if (!cats[p.cat]) cats[p.cat] = { cnt:0, sum:0 };
    cats[p.cat].cnt++;
    cats[p.cat].sum += Number(p.buyPrice)||0;
  });

  let h = '<div class="sec-label">カテゴリーを選択</div>';
  const allCnt = ALL_ITEMS.length;
  const allSum = ALL_ITEMS.reduce((a,p) => a + (Number(p.buyPrice)||0), 0);
  h += `<div class="pr2 ${!selCat?'sl':''}" onclick="selCatItem(null)"><span class="pln">全カテゴリー</span><span class="pamt">¥${allSum.toLocaleString('ja-JP')}</span><span class="plcwrap">(<span class="plc">${cntBadge(allCnt)}</span>)</span></div>`;
  Object.entries(cats).forEach(([c, v]) => {
    const cur = selCat === c;
    h += `<div class="pr2 ${cur?'sl':''}" onclick="selCatItem('${esc(c)}')"><span class="pln">${esc(c)}</span><span class="pamt">¥${v.sum.toLocaleString('ja-JP')}</span><span class="plcwrap">(<span class="plc">${cntBadge(v.cnt)}</span>)</span></div>`;
  });

  // タイプセクション（カテゴリー選択後に展開）
  const types = {};
  if (selCat) {
    ALL_ITEMS.filter(p => p.cat === selCat).forEach(p => {
      if (!p.type) return;
      if (!types[p.type]) types[p.type] = { cnt:0, sum:0 };
      types[p.type].cnt++;
      types[p.type].sum += Number(p.buyPrice)||0;
    });
  }
  const showTs = selCat && Object.keys(types).length > 0;
  h += `<div id="type-section" class="${showTs?'show':''}">`;
  if (showTs) {
    const catCnt = cats[selCat] ? cats[selCat].cnt : 0;
    const catSum = cats[selCat] ? cats[selCat].sum : 0;
    h += `<div class="sec-label" style="margin-top:6px;">▼ ${esc(selCat)} のタイプ</div>`;
    h += `<div class="pr2 ${!selType?'sl':''}" onclick="selTypeItem(null)"><span class="pln">全${esc(selCat)}</span><span class="pamt">¥${catSum.toLocaleString('ja-JP')}</span><span class="plcwrap">(<span class="plc">${cntBadge(catCnt)}</span>)</span></div>`;
    Object.entries(types).forEach(([t, v]) => {
      const cur = selType === t;
      h += `<div class="pr2 ${cur?'sl':''}" onclick="selTypeItem('${esc(t)}')"><span class="pln">${esc(t)}</span><span class="pamt">¥${v.sum.toLocaleString('ja-JP')}</span><span class="plcwrap">(<span class="plc">${cntBadge(v.cnt)}</span>)</span></div>`;
    });
  }
  h += '</div>';
  document.getElementById('pc').innerHTML = h;
}

function selCatItem(cat) {
  selCat  = cat;
  selType = null;
  buildCategoryPanel(false);
}
function selTypeItem(tp) {
  selType = tp;
  buildCategoryPanel(false);
}

// ── 並び順パネル構築 ──────────────────────────
function buildSortPanel(init) {
  if (init) { selSortKey = F.sortKey; selSortDir = F.sortDir; }
  document.getElementById('pt').textContent = '並び順';
  let h = '';
  SORT_ROWS.forEach(r => {
    const cur = selSortKey === r.key && selSortDir === r.dir;
    h += `<div class="pr2 ${cur?'sl':''}" onclick="selSortItem('${r.key}','${r.dir}')"><span class="pln">☐ ${esc(r.label)}</span></div>`;
  });
  document.getElementById('pc').innerHTML = h;
}
function selSortItem(key, dir) {
  if (selSortKey === key && selSortDir === dir) {
    // 同じ項目を再タップ→選択解除（既存回覧アプリのselectSortと同一ロジック）
    selSortKey = null; selSortDir = null;
  } else {
    selSortKey = key; selSortDir = dir;
  }
  buildSortPanel(false);
}

// ── 開いているパネルの選択内容をF（確定データ）へ書き込む（一覧へは反映しない） ──
function commitCurPanel() {
  if (curP === 'category') {
    F.category = selCat;
    F.type     = selType;
    updCategoryBtn();
  } else if (curP === 'sort') {
    F.sortKey = selSortKey;
    F.sortDir = selSortDir;
    updSortBtn();
  }
}

// ── パネル開閉 ──────────────────────────
// 既存回覧アプリと同じ挙動：別のボタンに切り替える場合は、編集中の内容を先に確定保存してから次のパネルを開く
function openPanel(name) {
  if (document.getElementById('pn').classList.contains('op')) {
    commitCurPanel();
  }
  curP = name;
  if (name === 'category') buildCategoryPanel(true);
  else if (name === 'sort') buildSortPanel(true);
  document.getElementById('pn').classList.add('op');
  document.getElementById('ov').classList.add('op');
}
function closeP() {
  document.getElementById('pn').classList.remove('op');
  document.getElementById('ov').classList.remove('op');
}

// ── 「表示」ボタン：現在開いている(または最後に編集していた)パネルの選択内容を確定し、
//     パネルを閉じて一覧に反映 ──
function applyShow() {
  commitCurPanel();
  F.confirmed = true;
  closeP();
  render();
}

// ── 「クリア」ボタン：既存回覧アプリのclrAllと同一ロジック ──
function clrAll() {
  F = { category:null, type:null, sortKey:null, sortDir:null, confirmed:false };
  selCat = null; selType = null;
  selSortKey = null; selSortDir = null;
  curP = null;
  closeP();
  updCategoryBtn();
  updSortBtn();
  render();
}

// ── カード1件分のHTML ──────────────────────────
function cardHtml(g, idx, total) {
  const stHtml = STATUS_LIST.map(s => `<span class="st-item">[${STATUS_ABBR[s]}]${String(g.statusCount[s]).padStart(2,'0')}</span>`).join('');
  const linkUrl = BROWSE_URL + '?name=' + encodeURIComponent(g.name);
  return `<div class="card">
    <div class="row1">
      <span class="gn">${esc(g.name)}</span>
      <span class="gc">${g.cnt}個</span>
    </div>
    <div class="row2">
      <span class="lbl-buy">金額</span>
      <span class="buywrap">¥<span class="buy ${buyColorClass(g.sum)}">${Math.round(g.sum).toLocaleString('ja-JP')}</span></span>
      <span class="lbl-profit">利益</span>
      ${profitValue(g)}
      <span class="seq">${String(idx+1).padStart(2,'0')}/${String(total).padStart(2,'0')}</span>
    </div>
    <div class="row3">
      <span class="st-wrap">${stHtml}</span>
      <a class="link-btn" href="${linkUrl}" target="_blank" title="回覧アプリで詳細を見る">→</a>
    </div>
  </div>`;
}

// ── メイン描画 ──────────────────────────
function render() {
  updCategoryBtn();
  updHeader();

  const list = document.getElementById('list');

  // 未確定（カテゴリー選択→「表示」を押す前）は一覧を表示しない
  if (!F.confirmed) {
    document.getElementById('hdr-amt').textContent = headerAmountStr(0);
    document.getElementById('hdr-cnt').textContent = headerCountStr(0);
    list.className = 'emptyhint';
    list.textContent = '下の「カテゴリー」から条件を選び、「表示」を押してください';
    return;
  }

  const groups = buildGroups(filteredItems());
  const sk = F.sortKey || 'cnt';
  const sd = F.sortDir || 'desc';
  groups.sort((a,b) => {
    const av = sk==='cnt' ? a.cnt : a.sum;
    const bv = sk==='cnt' ? b.cnt : b.sum;
    return (sd==='desc' || sd==='high') ? bv-av : av-bv;
  });

  const totalAmount = groups.reduce((a, g) => a + g.sum, 0);
  document.getElementById('hdr-amt').textContent = headerAmountStr(totalAmount);
  document.getElementById('hdr-cnt').textContent = headerCountStr(groups.length);

  if (groups.length === 0) {
    list.className = 'noresult';
    list.textContent = '該当する商品がありません';
    return;
  }
  list.className = '';
  list.innerHTML = groups.map((g,i) => cardHtml(g, i, groups.length)).join('');
}

// ── ボトムコントロールパネルの実高さを測定し、CSS変数に反映
//     （詳細選択パネル #pn / オーバーレイ #ov がこの高さの上で止まるようにする）
//     ★browse_index_v19と同じ方式。fixed座標のrAFループは使わない ──
function setBotHeight() {
  const h = document.getElementById('bot').offsetHeight;
  if (h > 0) document.getElementById('wrap').style.setProperty('--bot-h', h + 'px');
}

// ── 初期化 ──────────────────────────
function init() {
  gasCall('getLightItems', {}, res => {
    if (!res || !res.ok) {
      document.getElementById('load-msg').textContent = 'データ取得に失敗しました' + (res && res.error ? '（' + res.error + '）' : '');
      document.querySelector('#loading .spinner').style.display = 'none';
      return;
    }
    ALL_ITEMS = res.items;

    // データ取得完了 → ローディングを隠し、一覧・ボトムバーを表示
    document.getElementById('loading').style.display = 'none';
    document.getElementById('list').style.display    = 'block';
    document.getElementById('bot').style.display     = 'block';

    setBotHeight();
    window.addEventListener('resize', setBotHeight);

    updSortBtn();
    render();
  });
}
init();
</script>
